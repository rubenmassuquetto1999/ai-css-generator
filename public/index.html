<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">
    <title>CSS Gerador Com IA</title>
    <link rel="shortcut icon" href="./img/css.png" type="image/png">
</head>

<body>
    <h1>CSS Gerador <span>com IA</span> ⚡️</h1>
    <p>Descreva o que você imagina e veja a mágica acontecer!</p>

    <textarea rows="3" class="caixa-texto" placeholder="Ex: Bola azul pingando"></textarea>

    <span class="mensagem-erro">favor preencher o campo acima</span>

    <button class="botao-gerar">Gerar Código ⚡️</button>

    <div class="resultado">

        <div class="coluna">
            <h2>Código</h2>
            <pre class="bloco-codigo"></pre>
        </div>

        <div class="coluna">
            <h2>Preview</h2>
            <iframe class="resultado-codigo"></iframe>
        </div>

    </div>

    <script src="./scripts.js"></script>
</body>

</html>
